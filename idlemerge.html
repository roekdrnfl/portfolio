<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Idle merge</title>
        <style>            
            html, body {
                width: 100%;
                height: 100%;
                margin: 0;
            }
            #jungle {
                width: 100%;
                height: 100%;
                background: center / 100% no-repeat url("jungle.png")
            }
        </style>
    </head>
    <body>
        <div id="jungle">
            <img src="monkeys_v1.png" style="position: absolute; top: calc(50% - 145px / 2); left: calc(50% - 348px / 2);"/>
        </div>
    </body>
</html>
