<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Idle merge</title>
        <link rel="stylesheet" href="./styles/idlemerge.css" />
        <script type="module" src="./scripts/idlemerge/gamecontroller.js"></script>
    </head>
    <body>
        <div id="jungle">
            <div id="aggregation" class="interface flexbox">
                <div id="agg-monkey" class="flexbox">
                    <div><img src="./images/monkey_lv1.png"/></div>
                    <div class="quantity"></div>
                </div>
                <div id="agg-branch" class="flexbox">
                    <div><img src="./images/branch.png"/></div>
                    <div class="quantity"></div>
                </div>
            </div>
            <div id="contents" class="interface flexbox">
                <button id="generator">
                    <div class="flexbox centered column half-width">
                        <img src="./images/banana.png" style="height: 70%;"/>
                    </div>
                    <div class="flexbox centered column half-width" style="font-size: 1.5rem; font-family: fantasy;">
                        <div>feed</div>
                        <div id="remaining" style="font-size: 1rem;"></div>
                    </div>
                </button>
            </div>
        </div>
    </body>
</html>
