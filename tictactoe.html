<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            html,
            body {
                width: 100%;
                height: 100%;
            }
            .frame {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                grid-auto-rows: 50px;
                gap: 0.1rem;
                width: calc(150px + 0.2rem);
                background: pink;
            }
            .square {
                border: 1px solid black;
                font-size: 2rem;
                font-weight: bold;
                color: black;
                display: flex;
                align-items: center;
                justify-content: center;
            }
        </style>
    </head>
    <body>
        <div style="display: flex;">
            <div>
                <h5 id="information">Next player: X</h5>
                <div class="frame">
                    <div class="square"></div>
                    <div class="square"></div>
                    <div class="square"></div>
                    <div class="square"></div>
                    <div class="square"></div>
                    <div class="square"></div>
                    <div class="square"></div>
                    <div class="square"></div>
                    <div class="square"></div>
                </div>
            </div>
            <div id="snapshot" style="padding: 1rem 0 0 2rem;">
                <div class="no_1">
                    1. <button>Go to game start</button>
                </div>
            </div>
        </div>
        <script>
            window.onload = () => {
                //elements
                const squares = document.querySelectorAll(".square");
                const info = document.querySelector("#information");
                const snapshot = document.querySelector("#snapshot");

                //variables for game
                const len = 3, players = { true: "O", false: "X" },
                    initial = Array.from({ length: len ** 2 }).map(() => ""),
                    /* ! only this section was assisted by AI*/
                    wins = (n => {
                        const cases = [];

                        for (let i = 0; i < n; i++) {
                            cases.push(Array.from({ length: n }, (_, j) => i * n + j));
                            cases.push(Array.from({ length: n }, (_, j) => j * n + i));
                        }
                        cases.push(Array.from({ length: n }, (_, i) => i * (n + 1)));
                        cases.push(Array.from({ length: n }, (_, i) => (i + 1) * (n - 1)));

                        return cases;
                    })(len);

                let score = [initial], currentPlayer = false, isEnded = false;

                function GenerateInfo(){                    
                    const isDone = score.at(-1).every(mk => mk !== "");
                    
                    info.innerHTML = isDone ?
                        (isEnded ? `Winner: ${players[!currentPlayer]}` : `Draw`) :
                        `Next player: ${players[currentPlayer]}`;
                }

                function MoveToPast(e){
                    //move to past
                    const crrSnap = +e.target.parentElement.className.match(/\d/)[0];

                    score[crrSnap - 1].forEach((mark, idx) => {
                    squares[idx].innerHTML = mark;
                    });

                    snapshot.dataset.snap = crrSnap;

                    currentPlayer = crrSnap % 2 === 0;
                    GenerateInfo();
                }

                function AddNewBtn(){
                    const lastNumber = document.querySelectorAll("[class^='no_']").length;
                    const newNumber = document.createElement("div");
                    const newBtn = document.createElement("button");
                    newBtn.innerHTML = `Go to move # ${lastNumber}`;
                    newNumber.className = `no_${lastNumber + 1}`;
                    newNumber.append(`${lastNumber + 1}. `, newBtn);
                    snapshot.append(newNumber);

                    //register click event to the button
                    newBtn.addEventListener("click", moveToPast);
                }

                function RemoveBtns(){
                    const crrSnap = +snapshot.dataset.snap;
                    score = score.slice(0, crrSnap);

                    document
                        .querySelectorAll(`[class^="no_"]:nth-child(n + ${crrSnap + 1})`)
                        .forEach(no => no.remove());
                }

                document.getElementsByTagName("button")[0].addEventListener("click", moveToPast);

                squares.forEach(square => {
                    square.addEventListener("click", function () {
                        //exception handling
                        if (this.innerHTML || isEnded) return;

                        //if past
                        !!snapshot.dataset.snap && RemoveBtns();
                        
                        snapshot.dataset.snap && delete snapshot.dataset.snap;

                        AddNewBtn();

                        //mark to square
                        this.innerHTML = players[currentPlayer];

                        const currentSquare = Array.from(squares).map(sq => sq.innerHTML),
                            currentMark = players[currentPlayer];
                        score.push(currentSquare);

                        isEnded = wins.some(
                            ([a, b, c]) =>
                            currentSquare[a] === currentMark &&
                            currentSquare[b] === currentMark &&
                            currentSquare[c] === currentMark
                        );
                        currentPlayer = !currentPlayer;

                        GenerateInfo();
                    })
                })
            }
        </script>
    </body>
</html>
